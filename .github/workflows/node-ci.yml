name: Node CI

on:
  push:
  pull_request:

jobs:
  backend-and-frontend:
    name: Backend NestJS and frontend Vite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Examen/epn-event-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            Examen/epn-event-manager/package-lock.json
            Examen/epn-event-manager/frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: Examen/epn-event-manager/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Examen/epn-event-manager/frontend
        run: npm run build
